name: Generate Metrics (Isocalendar)

on:
  schedule:
    - cron: "45 16 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: profile-readme
  cancel-in-progress: false

jobs:
  isocalendar:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate 3D isometric calendar
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6  # v3.34
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          config_timezone: Asia/Shanghai
          config_display: regular
