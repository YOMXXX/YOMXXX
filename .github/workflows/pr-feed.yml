name: 📡 最近 PR 动态

on:
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Generate PR feed and patch README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PRS=$(gh search prs --author "${{ github.repository_owner }}" \
            --limit 5 --sort created --order desc \
            --json repository,title,state,url \
            --template '{{range .}}- {{if eq .state "merged"}}✅ Merged{{else if eq .state "closed"}}🚫 Closed{{else}}🔧 Opened{{end}} [`{{.repository.nameWithOwner}}`]({{.url}}) — _{{.title}}_{{"\n"}}{{end}}')

          PRS=$(printf '%s' "$PRS" | sed -e 's/[[:space:]]*$//' | awk 'NF')

          export PRS
          perl -i -0pe 's|<!--START_SECTION:activity-->.*?<!--END_SECTION:activity-->|<!--START_SECTION:activity-->\n$ENV{PRS}\n<!--END_SECTION:activity-->|s' README.md

      - name: Commit if changed (with rebase retry)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore(readme): refresh latest PR feed"
          for i in 1 2 3 4 5; do
            if git pull --rebase --autostash origin main && git push; then
              echo "pushed on attempt $i"
              exit 0
            fi
            echo "push attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "failed after 5 attempts"
          exit 1
