name: Update PR Feed

on:
  schedule:
    - cron: "30 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate PR feed and patch README
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PRS=$(gh search prs --author "${{ github.repository_owner }}" \
            --limit 5 --sort created --order desc \
            --json repository,title,state,url \
            --template '{{range .}}- {{if eq .state "merged"}}✅ Merged{{else if eq .state "closed"}}🚫 Closed{{else}}🔧 Opened{{end}} [`{{.repository.nameWithOwner}}`]({{.url}}) — _{{.title}}_
          {{end}}')

          awk -v block="$PRS" '
            /<!--START_SECTION:activity-->/ {
              print
              printf "%s", block
              skip = 1
              next
            }
            /<!--END_SECTION:activity-->/ {
              skip = 0
              print
              next
            }
            !skip { print }
          ' README.md > README.md.new
          mv README.md.new README.md

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(readme): refresh latest PR feed"
            git push
          fi
